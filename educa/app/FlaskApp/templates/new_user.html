<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="../static/css/new_user.css" rel="stylesheet" type="text/css"/>
    <title>ユーザー登録</title>
    <link rel="icon" href="../static/images/educaファビコン.png">
</head>
<body>
    <div class="contents_title">
        <img src="../static/images/educaアイコン.png" width="5%">
        <h2>新規ユーザー登録</h2>
        <div>
            <a href="{{ url_for('index') }}">
                <button>サービスTOP</button>
            </a>
        </div>      
    </div>
    <div class="main">
        <div class="left">
        </div>
        <div class="center">
            <center>
                {% if state == 'IDerror' %}
                    <div class="error_message">※ 違うeducaIDにしてください。</div>
                {% endif %}
                <div class="new_user_form">
                    <form method="POST">
                        <div>
                            <h3>educaID</h3>
                        </div>
                        <div class="box_line">
                            <input class="input_box" type="id" name="educaID" placeholder="半角英数字" required>
                        </div>
                        <div>
                            <h3>パスワード</h3>
                        </div>
                        <div class="box_line">
                            <input class="input_box" type="password" name="password" placeholder="半角英数字" required>
                        </div>
                        <div>
                            <h3>ユーザーネーム</h3>
                        </div>
                        <div class="box_line">
                            <input class="input_box" type="text" name="username" placeholder="テキスト" required>
                        </div>
                        <div class="button_line">
                            <input class="submit_button" type="submit" value="ユーザー登録">
                        </div>
                    </form>
                </div>
                <div class="to_login">
                    <a href="{{ url_for('login') }}">
                        <button>登録がお済みの方はこちらからログイン</button>
                    </a>
                </div>
            </center>
        </div>
        <div class="right">
        </div>
    </div>
</body>
</html>
