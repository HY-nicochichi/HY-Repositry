version: "3.7"

services:

  db:
    container_name: market_db
    build: ./db
    ports:
      - "5432:5432"
    volumes:
      - volume:/var/lib/postgresql/data
    networks:
      - network

  app:
    container_name: market_app
    build: ./app
    ports:
      - "443:443"
    depends_on:
      - db
    networks:
      - network

volumes:
  volume:

networks:
  network:
