{% extends "layout.html" %}

{% block title %}
    ユーザー登録
{% endblock %}
    
{% block content %}
    <h2>
        ユーザー登録
    </h2>
    {% with message = get_flashed_messages() %}
        {% if message %}
            <div>
                ※ {{ message[0] }}
            </div>
            <br>
        {% endif %}
    {% endwith %}
    <div>
        <form method="POST">
            <input type="hidden" name="csrf_token" value="{{ csrf_token() }}"/>
            <div>
                MAIL <input type="text" name="MAIL" required>
            </div>
            <div>
                PASS <input type="password" name="PASS" required>
            </div>
            <div>
                NAME <input type="text" name="username" required>
            </div>
            <br>
            <div>
                <input type="submit" value="新規登録">
            </div>
        </form>
    </div>
    <br>
    <div>
        <a href="/login">ログイン</a>
    </div>
    <br>
    <div>
        <a href="/">TOPページ</a>
    </div>
{% endblock %}
