{% extends "layout.html" %}

{% block title %}
  ユーザー登録
{% endblock %}

{% block navbar %}
  <ul class="navbar-nav">
    <li class="nav-item active">
      <a type="button" class="nav-link" href="/login">ログイン</a>
    </li>
  </ul>
{% endblock %}

{% block content %}
  {% with message = get_flashed_messages() %}
    {% if message %}
      <div class="alert alert-danger" role="alert">
        {{ message[0] }}
      </div>
    {% endif %}
  {% endwith %}
  <h4>
    <b>ユーザー登録</b>
  </h4>
  <div class="col-sm-9 col-md-7 col-lg-5 border border-primary bg-light">
    <div class="row">
      <div class="col mt-3">
        <form method="POST">
          <input type="hidden" name="csrf_token" value="{{ csrf_token() }}"/>
          <div class="form-group">
            <label>メールアドレス</label>
            <input type="text" class="form-control border border-primary" name="mail" required>
          </div>
          <div class="form-group">
            <label>パスワード</label>
            <input type="password" class="form-control border border-primary" name="password" required>
          </div>
          <div class="form-group">
            <label>ユーザーネーム</label>
            <input type="text" class="form-control border border-primary" name="username" required>
          </div>
          <br>
          <div class="form-group">
            <input type="submit" class="btn btn-primary" value="新規登録">
          </div>
        </form>
      </div>
    </div>
  </div>
{% endblock %}
