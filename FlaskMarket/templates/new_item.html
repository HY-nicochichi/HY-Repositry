{% extends "layout.html" %}

{% block title %}
    商品登録
{% endblock %}

{% block content %}
  <h4>
    <b>商品登録</b>
  </h4>
  <div class="col-sm-9 col-md-7 col-lg-5 border border-primary bg-light">
    <div class="row">
      <div class="col mt-3">
        <form method="POST">
          <input type="hidden" name="csrf_token" value="{{ csrf_token() }}"/>
          <div class="form-group">
            <label>商品名</label>
            <input type="text" class="form-control border border-primary" name="itemname" required>
          </div>
          <div class="form-group">
            <label>価格</label>
            <input type="number" class="form-control border border-primary" name="price" min="0" required>
          </div>
          <div class="form-group">
            <label>在庫</label>
            <input type="number" class="form-control border border-primary" name="stock" min="1" required>
          </div>
          <div class="form-group">
            商品タグ
            <select name="tag" class="ml-3 border border-primary" required>
              <option value="fish">鮮魚</option>
              <option value="meat">精肉</option>
              <option value="vegetable">青果</option>
              <option value="other">その他</option>
            </select>
          </div>
          <br>
          <div class="form-group">
            <input type="submit" class="btn btn-primary" value="新規登録">
          </div>
        </form>
      </div>
    </div>
  </div>
{% endblock %}
