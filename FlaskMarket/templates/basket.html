{% extends "layout.html" %}

{% block title %}
  買い物カゴ
{% endblock %}

{% block content %}
  <h4>
    <b>買い物カゴ</b>
  </h4>
  <div class="text-danger">
    ※ ログアウトすると空になります
  </div>
  <br>
  <form method="POST" name="order_form">
    <input type="hidden" name="csrf_token" value="{{ csrf_token() }}"/>
    <input type="hidden" name="act" id="act" value="order">
    {% for x in range(basket['content']|length) %}
      <div class="mb-3 d-flex align-items-center">
        <div class="px-3 py-2 co1-7 col-sm-6 col-md-5 col-lg-4 bg-light border border-primary">
          {{basket['content'][x]['name']}} ({{basket['content'][x]['price']}}円)
        </div>
        <input type="number" class="ml-3 mr-1 border border-primary" name="{{basket['content'][x]['id']}}" 
        value="{{basket['content'][x]['num']}}" min="0" max="{{basket['content'][x]['stock']}}" 
        onchange="update_basket()" required>点
      </div>   
    {% endfor %}
    <div>
      合計：<b>{{basket['sum']}}</b> 円
    </div>
    <br>
    <div class="d-flex align-items-center">
      <input type="submit" class="btn btn-primary" value="注文">
    </div>
  </form>
  <script>
    function update_basket() {
      document.order_form.act.value = "update";
      document.order_form.submit();
    };
  </script>
{% endblock %}
