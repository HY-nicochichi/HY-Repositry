<!DOCTYPE html>
<html lang="ja">

<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no">

  <!-- Bootstrap CSS -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-9ndCyUaIbzAi2FUVXJi0CjmCapSmO7SnpJef0486qhLnuZ2cdeRhO02iuK6FUUVM" crossorigin="anonymous">

  <title>
    {% block title %}
    {% endblock %}
  </title>

  <link rel="icon" href="../static/assets/image/icon.png">
</head>

<body>
  <div id="vueApp">

    <!-- Navigation Bar -->
    <div>
      <nav class="navbar navbar-expand-sm navbar-dark bg-dark my-3 py-2">
        <a class="navbar-brand color-dark d-flex align-items-center" href="/">
          <img src="../static/assets/image/icon.png" width="40" alt="">
          <b class="ml-2">Flask Market</b>
        </a>
        <button class="navbar-toggler" type="button" data-toggle="collapse" data-target="#NavBarContent" aria-controls="NavBarContent" aria-expanded="false" aria-label="Toggle navigation">
          <img src="../static/assets/image/navbar-toggler-icon.png" width="35" alt="">
        </button>
        <div class="collapse navbar-collapse justify-content-end" id="NavBarContent">
          <ul v-if="user_info['login'] == true" class="navbar-nav">
            <li class="nav-item active">
              <a type="button" class="nav-link mr-2" href="/profile">"<B>[(user_info['name'])]</B>" 様</a>
            </li>
            <li class="nav-item active">
              <a type="button" class="nav-link mr-2" href="/basket">買い物カゴ</a>
            </li>
            <li class="nav-item active">
              <a type="button" class="nav-link" href="/logout">ログアウト</a>
            </li>
          </ul>
          <ul v-else class="navbar-nav">
            <li class="nav-item active">
              <a type="button" class="nav-link mr-2" href="/login">ログイン</a>
            </li>
            <li class="nav-item active">
              <a type="button" class="nav-link" href="/new_user">会員登録</a>
            </li>
          </ul>
        </div>
      </nav>
    </div>

    <div class="mx-3">
      {% block content %}
      {% endblock %}
    </div>

  </div>

  <!-- Bootstrap JS -->
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js" integrity="sha384-geWF76RCwLtnZ8qwWowPQNguL3RmwHVBC9FhGdlKrxdiJJigb/j/68SIy3Te4Bkz" crossorigin="anonymous"></script>

  <!-- Vue3.JS -->
  <script src="https://cdn.jsdelivr.net/npm/vue@3.2"></script>
  <script>
    let vueApp = Vue.createApp({
      data() {
        return {
          {% block json_data %}
          {% endblock %}
        }
      },
      delimiters: ['[(', ')]'],
      methods: {
        {% block vue_func %}
        {% endblock %}
      }
    }).mount('#vueApp');
    {% block opt_script %}
    {% endblock %}
  </script>
</body>

</html>
